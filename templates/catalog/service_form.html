{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url "catalog:service_list" %}" class="text-gray-400 hover:text-gray-600">←</a>
    <h1 class="text-xl font-bold text-gray-900">{{ title }}</h1>
  </div>

  <div class="card p-6">
    <form method="post">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Name <span class="text-red-500">*</span></label>
          <input type="text" name="name" value="{{ form.name.value|default:'' }}" class="input" required placeholder="e.g. Website Design, Monthly Retainer…">
        </div>
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
            <select name="category" class="input">
              <option value="">— None —</option>
              {% for cat in form.fields.category.queryset %}
              <option value="{{ cat.pk }}" {% if form.category.value|stringformat:"s" == cat.pk|stringformat:"s" %}selected{% endif %}>{{ cat }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Unit</label>
            <select name="unit" class="input">
              {% for val, label in form.fields.unit.choices %}
              <option value="{{ val }}" {% if form.unit.value == val %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea name="description" class="input" rows="2" placeholder="Optional description that auto-fills line item description">{{ form.description.value|default:'' }}</textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Default Price</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm font-medium pointer-events-none">{{ site_settings.currency_symbol|default:"Rs." }}</span>
            <input type="number" name="default_price" value="{{ form.default_price.value|default:'0' }}" class="input pl-10" min="0" step="0.01">
          </div>
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" name="is_active" id="id_is_active" {% if form.is_active.value != False %}checked{% endif %}>
          <label for="id_is_active" class="text-sm text-gray-700 mb-0">Active (shown in catalog search)</label>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Save Service</button>
        <a href="{% url "catalog:service_list" %}" class="btn-secondary">Cancel</a>
        {% if service %}
        <form method="post" action="{% url "catalog:service_delete" service.pk %}" class="ml-auto" onsubmit="return confirm('Delete this service?')">
          {% csrf_token %}
          <button type="submit" class="btn-danger">Delete</button>
        </form>
        {% endif %}
      </div>
    </form>
  </div>
</div>
{% endblock %}
