{% extends "base.html" %}
{% block title %}Calendar{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
{% endblock %}
{% block content %}
<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Calendar</h1>
    <p class="text-sm text-gray-500 mt-0.5">Follow-ups, invoice due dates, and contract expiries</p>
  </div>
  <div class="flex flex-wrap gap-2 text-xs">
    <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-blue-500 inline-block"></span> Lead Follow-up</span>
    <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-emerald-500 inline-block"></span> Client Follow-up</span>
    <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-amber-400 inline-block"></span> Invoice Due</span>
    <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-red-500 inline-block"></span> Invoice Overdue</span>
    <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-violet-500 inline-block"></span> Contract Expiry</span>
  </div>
</div>

<div class="card p-4">
  <div id="calendar"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const calendarEl = document.getElementById('calendar');
  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,timeGridWeek,listWeek'
    },
    height: 'auto',
    eventSources: [{
      url: '{% url "dashboard:calendar_events" %}',
      method: 'GET',
      extraParams: function() { return {}; },
      failure: function() { console.error('Failed to load calendar events'); }
    }],
    eventClick: function(info) {
      if (info.event.url) {
        info.jsEvent.preventDefault();
        window.location.href = info.event.url;
      }
    },
    eventDidMount: function(info) {
      info.el.title = info.event.extendedProps.type + ': ' + info.event.title;
    },
  });
  calendar.render();
});
</script>
{% endblock %}
